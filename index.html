*{margin:0;padding:0;box-sizing:border-box}

.hdr-info{display:flex;gap:12px;font-size:11px;align-items:center;flex-wrap:wrap;opacity:.92}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--ok);margin-right:3px}
.dot.off{background:var(--flat)}.dot.warn{background:var(--warn)}
.tabs{background:var(--card);border-bottom:1px solid var(--bd);padding:0 10px;position:sticky;top:48px;z-index:150;overflow-x:auto;white-space:nowrap}

function wilderRSI(closes, period){
  period = period || 6;
  if(!closes || closes.length < period+1) return null;
  var ag=0, al=0, i, d;
  for(i=1;i<=period;i++){ d=closes[i]-closes[i-1]; ag+=Math.max(d,0); al+=Math.max(-d,0); }
  ag/=period; al/=period;
  for(i=period+1;i<closes.length;i++){ d=closes[i]-closes[i-1]; ag=(ag*(period-1)+Math.max(d,0))/period; al=(al*(period-1)+Math.max(-d,0))/period; }
  if(al===0) return 100;
  var rs=ag/al; return Math.round((100-100/(1+rs))*100)/100;
}

/* ============ 核心算法：评分 calcScore（满分100，六项明细） ============ */
function calcScore(o){
  var d = {}, missing = [];
  // 涨幅动量 0-25
  d.momentum = o.chg>=3 ? 25 : o.chg>=1 ? 18 : o.chg>0 ? 10 : o.chg>-1 ? 5 : 0;
  // RSI6 真实值 0-20
  var r = o.rsi6;
  if(r==null){ d.rsi = 0; missing.push("RSI6"); }
  else if(r>=50 && r<68) d.rsi = 20;
  else if(r>=68 && r<75) d.rsi = 14;
  else if(r>=40 && r<50) d.rsi = 8;
  else if(r>=75 && r<85) d.rsi = 6;
  else if(r>=85 || r<30) d.rsi = 0;
  else d.rsi = 2;
  // 换手率 0-15
  var t = o.turnover;
  if(t==null){ d.turnover = 3; missing.push("换手率"); }
  else if(t>=3 && t<8) d.turnover = 15;
  else if((t>=2 && t<3) || (t>=8 && t<12)) d.turnover = 9;
  else d.turnover = 3;
  // 主力资金 0-15（亿元；null=数据不足按中性7分）
  var f = o.fund;
  if(f==null){ d.fund = 7; missing.push("资金"); }
  else if(f>1) d.fund = 15;
  else if(f>0) d.fund = 10;
  else if(f>-1) d.fund = 4;
  else d.fund = 0;
  // 趋势结构 0-15
  if(o.price!=null && o.ma5!=null && o.ma10!=null && o.price>o.ma5 && o.ma5>o.ma10) d.trend = 15;
  else if(o.price!=null && o.ma5!=null && o.price>o.ma5) d.trend = 10;
  else if(o.price!=null && o.ma10!=null && o.price>o.ma10) d.trend = 6;
  else d.trend = 2;
  // 板块宽度 0-10
  var b = o.breadth;
  if(b==null){ d.breadth = 1; missing.push("宽度"); }
  else if(b>=60) d.breadth = 10;
  else if(b>=50) d.breadth = 7;
  else if(b>=40) d.breadth = 4;
  else d.breadth = 1;
  var total = d.momentum + d.rsi + d.turnover + d.fund + d.trend + d.breadth;
  return { total: total, detail: d, missing: missing };
}
/* ============ 阶段判定 judgeStage（五阶段+观察，无兜底错判） ============ */
function judgeStage(o){ // {score, rsi6, chg, fund, topN}
  var rsi = o.rsi6==null ? 0 : o.rsi6;
  if(o.score>=82 && o.topN>=2) return "赶顶";
  if(o.score>=82 && rsi>=68 && rsi<85 && o.topN<2) return "加速";
  if(o.score>=72 && rsi>=48) return "确认";
  if(o.score>=60 && o.chg>0) return "启动";
  if(rsi<40 || (o.fund!=null && o.fund<-1 && o.chg<-2)) return "退潮";
  return "观察";
}
/* ============ 加速赶顶 8 信号（全系统唯一定义） ============ */
function calcTopSignals(o){ // {rsi6, chg, turnover, devMa5, fund, chg5d, prevRsi6, isHigh5, breadth}
  function sig(name, ok, desc){ return {name:name, ok:ok, desc:desc}; }
  return [
    sig("RSI6>85（超买）", o.rsi6==null?null:(o.rsi6>85), "RSI6="+fmt(o.rsi6)),
    sig("板块/个股单日涨>5%", o.chg==null?null:(o.chg>5), "涨跌幅="+pctTxt(o.chg)),
    sig("换手率>8%", o.turnover==null?null:(o.turnover>8), "换手率="+(o.turnover==null?"数据不足":fmt(o.turnover)+"%")),
    sig("价偏离MA5>7%", o.devMa5==null?null:(o.devMa5>7), "偏离="+(o.devMa5==null?"数据不足":fmt(o.devMa5)+"%")),
    sig("上涨但主力净流出", (o.fund==null||o.chg==null)?null:(o.chg>0 && o.fund<0), o.fund==null?"资金数据不足":"资金="+fmt(o.fund)+"亿"),
    sig("5日累计涨>15%", o.chg5d==null?null:(o.chg5d>15), "5日涨幅="+pctTxt(o.chg5d)),
    sig("RSI顶背离（RSI降且价创5日新高）", (o.prevRsi6==null||o.rsi6==null||o.isHigh5==null)?null:(o.rsi6<o.prevRsi6 && o.isHigh5), o.prevRsi6==null?"K线数据不足":"前RSI="+fmt(o.prevRsi6)),
    sig("板块宽度<40%", o.breadth==null?null:(o.breadth<40), "宽度="+(o.breadth==null?"数据不足":fmt(o.breadth,1)+"%"))
  ];
}
/* ============ 退潮 5 信号 ============ */
function calcEbbSignals(o){ // {rsi6, fund, chg, priceBelowMa10, breadth}
  function sig(name, ok, desc){ return {name:name, ok:ok, desc:desc}; }
  return [
    sig("RSI6<40", o.rsi6==null?null:(o.rsi6<40), "RSI6="+fmt(o.rsi6)),
    sig("主力净流出>1亿", o.fund==null?null:(o.fund<-1), o.fund==null?"资金数据不足":"资金="+fmt(o.fund)+"亿"),
    sig("单日跌>3%", o.chg==null?null:(o.chg<-3), "涨跌幅="+pctTxt(o.chg)),
    sig("价跌破MA10", o.priceBelowMa10==null?null:o.priceBelowMa10, o.priceBelowMa10==null?"数据不足":(o.priceBelowMa10?"已跌破":"未跌破")),
    sig("板块宽度<30%", o.breadth==null?null:(o.breadth<30), "宽度="+(o.breadth==null?"数据不足":fmt(o.breadth,1)+"%"))
  ];
}
/* ============ 主线质量五分类 classifyMainLine ============ */
function classifyMainLine(o){ // {stage, fund, chg, breadth, score}
  if(o.stage==="赶顶") return "赶顶风险";
  if(o.stage==="确认" || o.stage==="加速"){
    var fundOK = (o.fund==null) ? (o.chg>0 && o.breadth>=60) : (o.fund>0);
    if(fundOK && o.chg>0 && o.breadth>=50 && o.score>=72) return "真主线";
    if(o.chg>0) return "独立抱团";
  }
  if(o.stage==="启动") return "局部活跃";
  if(o.stage==="退潮" || o.stage==="观察"){
    var outflow = (o.fund==null) ? (o.chg<-3) : (o.fund<-1);
    if(outflow) return "资金出逃";
  }
  if(o.stage==="退潮" || (o.stage==="观察" && o.chg<0)) return "退出观察";
  return "观察";
}

      rsi6:s.rsi6, chg:s.chg, turnover:s.turnover, devMa5:inp.devMa5, fund:inp.fund,
      chg5d:s.chg5d, prevRsi6:s.prevRsi6,
      isHigh5: (s.level!=null && s.levelHigh5!=null) ? (s.level>=s.levelHigh5) : null,
      breadth:s.breadth
    });
    var topN = topSigs.filter(function(x){return x.ok===true;}).length;
    var stage = judgeStage({score:sc.total, rsi6:s.rsi6, chg:s.chg, fund:inp.fund, topN:topN});
    var ebbSigs = calcEbbSignals({
      rsi6:s.rsi6, fund:inp.fund, chg:s.chg,
      priceBelowMa10: (s.level!=null && s.ma10!=null) ? (s.level<s.ma10) : null,
      breadth:s.breadth
    });
    var cat = classifyMainLine({stage:stage, fund:inp.fund, chg:s.chg, breadth:s.breadth, score:sc.total});
    S.derived[s.key] = { score:sc.total, scoreDetail:sc.detail, missing:sc.missing, stage:stage,
      topSigs:topSigs, topN:topN, ebbSigs:ebbSigs, category:cat, fund:inp.fund };
  }
  for(i=0;i<S.stocks.length;i++){
    s = S.stocks[i];
    var sec = S.sectorByKey[s.sector];
    var sf = (s.code in S.fundStock) ? S.fundStock[s.code] : null;
    var si = calcScore({ chg:s.chg, rsi6:s.rsi6, turnover:s.turnover, fund:sf,
      price:s.price, ma5:s.ma5, ma10:s.ma10, breadth: sec?sec.breadth:null });
    S.stockDerived[s.code] = { score:si.total, detail:si.detail, missing:si.missing, fund:sf };
  }
  var avgIdx = S.indices.length ? S.indices.reduce(function(a,x){return a+(x.chg||0);},0)/S.indices.length : 0;
  var upRatio = S.sectors.length ? S.sectors.filter(function(x){return x.chg>0;}).length/S.sectors.length : 0;
  S.sentiment = clamp(Math.round(50 + avgIdx*3 + upRatio*40 - 50), 5, 95);
  computePicks();
  scanAlerts();
  storeCloseClass();
}
/* ============ 选股（高盈亏比模型） ============ */
function computePicks(){
  var stats = { total:S.stocks.length, stageRej:0, rsiRej:0, trendRej:0, fundRej:0, riskRej:0 };
  var cands = [], avoid = [];
  S.stocks.forEach(function(st){
    var sec = S.sectorByKey[st.sector];
    var sd = S.derived[st.sector] || {};
    if(sd.stage==="退潮" || sd.stage==="赶顶"){
      avoid.push({stock:st, reason:"所属板块「"+(sec?sec.name:st.sector)+"」处于"+sd.stage+"阶段"});
    }
    if(!(sd.stage==="启动" || sd.stage==="确认")){ stats.stageRej++; return; }
    if(st.rsi6==null || st.rsi6<45 || st.rsi6>72){ stats.rsiRej++; return; }
    var aboveMa = (st.ma5!=null && st.price>st.ma5) || (st.ma10!=null && st.price>st.ma10);
    if(!aboveMa){ stats.trendRej++; return; }
    var fund = (st.code in S.fundStock) ? S.fundStock[st.code] : null;
    if(fund!=null && fund<0){ stats.fundRej++; return; }
    var stop = Math.max(st.ma10||0, st.low10||0);
    if(stop<=0 || st.price<=stop){ stats.riskRej++; return; }
    var risk = (st.price-stop)/st.price;
    var target = Math.min((st.high20||st.price)*1.05, st.price*1.15);
    var reward = (target-st.price)/st.price;
    if(risk<=0 || reward<=0){ stats.riskRej++; return; }
    var rr = reward/risk;
    var sc = (S.stockDerived[st.code]||{score:0}).score;
    var comp = sc * Math.min(rr,5);
    var pos = (rr>=3 && sc>=75) ? "3成" : (rr>=2 ? "2成" : "1成试错");
    cands.push({ stock:st, secName:sec?sec.name:st.sector, stage:sd.stage, stop:stop, target:target,
      risk:risk, reward:reward, rr:rr, score:sc, comp:comp, pos:pos, fund:fund });
  });
  cands.sort(function(a,b){ return b.comp-a.comp; });
  S.picks = cands.slice(0,8);
  S.pickStats = stats;
  S.avoid = avoid;
}
/* ============ 预警扫描 ============ */
function pushAlert(level, target, rule, advice){
  var now = new Date();
  var tm = now.getFullYear()+"-"+("0"+(now.getMonth()+1)).slice(-2)+"-"+("0"+now.getDate()).slice(-2)+" "+("0"+now.getHours()).slice(-2)+":"+("0"+now.getMinutes()).slice(-2)+":"+("0"+now.getSeconds()).slice(-2);
  var key = S.tradeDate+"|"+target+"|"+rule;
  var hist = lsGet("v5_alert_hist", []);
  var dup = S.alerts.some(function(a){return a.key===key;}) || hist.some(function(a){return a.key===key;});
  if(dup) return false;
  var a = { key:key, time:tm, level:level, target:target, rule:rule, advice:advice };
  S.alerts.unshift(a);
  hist.unshift(a);
  lsSet("v5_alert_hist", hist.slice(0,200));
  beep();
  return true;
}
function holdingGuidance(h){
  // 返回 [{level:'red'|'yellow'|'green', text}]，逐条命中规则
  var out = [];
  var st = S.stockByCode[h.code];
  if(!st){
    out.push({level:"green", text:"池外个股仅显示盈亏，无指标指导"});
    return out;
  }
  var price = st.price, cost = h.cost;
  var pnl = cost>0 ? (price/cost-1)*100 : 0;
  var sd = S.derived[st.sector] || {};
  if(pnl<=-5) out.push({level:"red", text:"🔴止损建议：浮亏"+fmt(pnl)+"% ≤ -5%，触发亏损红线"});
  if(st.ma10!=null && price<st.ma10) out.push({level:"red", text:"🔴止损建议：现价"+fmt(price)+" 跌破MA10("+fmt(st.ma10)+")"});
  if(st.rsi6!=null && st.rsi6>85) out.push({level:"red", text:"🔴清仓止盈：RSI6="+fmt(st.rsi6)+" > 85，严重超买"});
  else if(st.rsi6!=null && st.rsi6>80) out.push({level:"yellow", text:"🟡分批止盈1/3：RSI6="+fmt(st.rsi6)+" > 80，超买区"});
  if(sd.stage==="退潮") out.push({level:"red", text:"🔴清仓：所属板块「"+(S.sectorByKey[st.sector]||{}).name+"」已进入退潮阶段"});
  if((sd.topN||0)>=2) out.push({level:"yellow", text:"🟡减仓1/2：所属板块赶顶信号 "+sd.topN+"/8 ≥ 2"});
  if(!out.length) out.push({level:"green", text:"🟢持有：浮盈"+fmt(pnl)+"%，未跌破MA10，RSI6="+fmt(st.rsi6)+"，板块阶段="+(sd.stage||"—")+"，无止盈止损触发"});
  return out;
}
function scanAlerts(){
  var prevStages = lsGet("v5_prev_stages", {});
  S.sectors.forEach(function(s){
    var d = S.derived[s.key]; if(!d) return;
    var prev = prevStages[s.key];
    if(d.stage==="退潮" && prev!=="退潮") pushAlert("red","板块·"+s.name,"新进入退潮阶段","建议清仓该板块相关持仓，回避买入");
    if(d.stage==="赶顶" && prev!=="赶顶") pushAlert("red","板块·"+s.name,"新进入赶顶阶段","赶顶信号 "+d.topN+"/8，建议分批止盈，禁止追高");
    if(s.rsi6!=null && s.rsi6>85) pushAlert("yellow","板块·"+s.name,"RSI6="+fmt(s.rsi6)+" > 85 超买","警惕高位回落，不建议新开仓");
    if(s.breadth!=null && s.breadth<30) pushAlert("yellow","板块·"+s.name,"上涨宽度="+fmt(s.breadth,1)+"% < 30%","板块内部严重分化，上涨缺乏广度");
  });
  var cur = {};
  S.sectors.forEach(function(s){ cur[s.key]=(S.derived[s.key]||{}).stage||"观察"; });
  lsSet("v5_prev_stages", cur);
  S.holdings.forEach(function(h){
    holdingGuidance(h).forEach(function(g){
      if(g.level==="red") pushAlert("red","持仓·"+h.name+"("+h.code+")", g.text.replace(/^🔴/,""), "按止盈止损纪律执行");
    });
  });
  S.indices.forEach(function(ix){
    if(ix.code==="sh000001" && ix.chg<-2) pushAlert("red","指数·上证指数","单日跌 "+fmt(ix.chg)+"% > 2%","系统性风险，降低总仓位");
  });
}
function beep(){
  if(!S.beep) return;
  try{
    var Ctx = window.AudioContext || window.webkitAudioContext;
    if(!Ctx) return;
    var ctx = new Ctx();
    var osc = ctx.createOscillator(), g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.frequency.value = 880; g.gain.value = 0.08;
    osc.start(); osc.stop(ctx.currentTime+0.15);
  }catch(e){}
}

        + '<td>'+fmt(hh.cost)+'</td><td>'+(price!=null?fmt(price):"—")+'</td><td>'+hh.qty+'</td>'
        + '<td>'+(mv!=null?Math.round(mv):"—")+'</td>'
        + '<td class="'+(pnl==null?"flat":pctCls(pnl))+'">'+(pnl==null?"等待行情":pctTxt(pnl))+'</td>'
        + '<td>'+(sd?stageTag(sd.stage):"—")+'</td><td>'+(st?fmt(st.rsi6):"—")+'</td><td>'+(st?fmt(st.ma5):"—")+'</td><td>'+(st?fmt(st.ma10):"—")+'</td>'

      gs.forEach(function(g){ h += '<div class="'+(g.level==="red"?"up":g.level==="yellow"?"":"dn")+'" style="font-size:12px;'+(g.level==="yellow"?"color:var(--warn)":"")+'">'+esc(g.text)+'</div>'; });
      h += '</div>';
    });

    var codeIn = el("hCode"), nameIn = el("hName");

      var c = codeIn.value.trim();
      if(S.stockByCode[c]) nameIn.value = S.stockByCode[c].name;
    });
    var addBtn = el("hAdd");
    if(addBtn) addBtn.addEventListener("click", function(){
      var c = el("hCode").value.trim(), n = el("hName").value.trim();
      var cost = parseFloat(el("hCost").value), qty = parseInt(el("hQty").value, 10);
      if(!c || !n || !(cost>0) || !(qty>0)){ return; }

      computeAll(); renderAll();

    for(var i=0;i<dels.length;i++){
      (function(b){ b.addEventListener("click", function(){

        lsSet("v5_holdings", S.holdings); computeAll(); renderAll();
      }); })(dels[i]);
    }
  }catch(e){}
}

/* 用实时个股涨跌幅重算板块宽度/涨停/涨跌幅（RSI/MA 仍以K线为准） */
function recomputeSectorsFromStocks(live){
  S.sectors.forEach(function(s){
    var members = S.stocks.filter(function(x){return x.sector===s.key;});
    if(!members.length) return;
    var sum=0, up=0, down=0, lu=0, tos=[];
    members.forEach(function(m){
      sum += m.chg||0;
      if(m.chg>0) up++; else if(m.chg<0) down++;
      var th = (m.code.indexOf("688")===0 || m.code.indexOf("300")===0) ? 19.5 : 9.5;
      if(m.chg>=th) lu++;
      if(m.turnover!=null) tos.push(m.turnover);
    });
    s.chg = Math.round(sum/members.length*100)/100;
    s.upCount = up; s.downCount = down;
    s.breadth = Math.round(up/members.length*1000)/10;
    if(live){ /* 实时时段涨停数按实时涨幅口径 */ }
    s.limitUp = lu;
    if(tos.length) s.turnover = Math.round(tos.reduce(function(a,b){return a+b;},0)/tos.length*100)/100;
  });
}
/* ============ L2 K线缓存加载 ============ */
function klCacheKey(pc){ return "v5_kl_"+pc+"_"+S.tradeDate; }
function parseKlinePayload(obj, pc){
  try{
    var node = obj.data[pc];
    var rows = node.qfqday || node.day || [];
    return rows.map(function(r){ return [r[0], +r[1], +r[2], +r[3], +r[4], +r[5]]; });

function loadOneKline(pc, cb){
  var cached = lsGet(klCacheKey(pc), null);
  if(cached && cached.length>=8){ cb(cached); return; }
  var varName = "v5kl_"+pc.replace(/[^a-zA-Z0-9]/g,"");

    var rows = null;

    }
    try{ delete window[varName]; }catch(e){ window[varName]=undefined; }
    if(rows && rows.length>=8){ lsSet(klCacheKey(pc), rows); cb(rows); }

  });

function applyKline(pc, rows){
  var closes = rows.map(function(r){return r[2];});
  var highs = rows.map(function(r){return r[3];});
  var lows = rows.map(function(r){return r[4];});
  var code = pc.slice(2);
  var st = S.stockByCode[code];
  var p2 = function(a,b){ return b ? Math.round((a/b-1)*10000)/100 : 0; };
  if(st){
    st.price = Math.round(closes[closes.length-1]*100)/100;
    st.chg = p2(closes[closes.length-1], closes[closes.length-2]);
    st.rsi6 = wilderRSI(closes,6);
    st.prevRsi6 = wilderRSI(closes.slice(0,-1),6);
    st.ma5 = maN(closes,5); st.ma10 = maN(closes,10);
    st.low10 = Math.round(Math.min.apply(null,lows.slice(-10))*100)/100;
    st.high20 = Math.round(Math.max.apply(null,highs.slice(-20))*100)/100;
    st.high5 = Math.round(Math.max.apply(null,highs.slice(-5))*100)/100;
    st.chg5d = closes.length>=6 ? p2(closes[closes.length-1], closes[closes.length-6]) : null;
    return;
  }
  var ix = null;
  for(var i=0;i<S.indices.length;i++) if(S.indices[i].code===pc) ix=S.indices[i];
  if(ix){
    ix.price = Math.round(closes[closes.length-1]*100)/100;
    ix.chg = p2(closes[closes.length-1], closes[closes.length-2]);
    ix.rsi6 = wilderRSI(closes,6);
    ix.ma5 = maN(closes,5); ix.ma10 = maN(closes,10);
  }
}
/* 由成分股K线重新合成板块指数（与 bake_v5.py 同算法） */
function resynthSector(skey){
  var s = S.sectorByKey[skey]; if(!s) return;
  var members = S.stocks.filter(function(x){return x.sector===s.key;});
  var series = [];
  members.forEach(function(m){
    var pc = (m.code.charAt(0)==="6"?"sh":"sz")+m.code;
    var rows = S.klines[pc];
    if(!rows || rows.length<8) return;
    var dayChg = {};
    for(var i=1;i<rows.length;i++){
      dayChg[rows[i][0]] = rows[i-1][2] ? Math.round((rows[i][2]/rows[i-1][2]-1)*10000)/100 : 0;
    }
    series.push(dayChg);
  });
  if(!series.length) return;
  var dates = [];
  series.forEach(function(dc){ for(var d in dc) if(dates.indexOf(d)<0) dates.push(d); });
  dates.sort();
  var syn = [1000], i, d;
  for(i=0;i<dates.length;i++){
    var vals = [];
    for(var j=0;j<series.length;j++) if(dates[i] in series[j]) vals.push(series[j][dates[i]]);
    var c = vals.reduce(function(a,b){return a+b;},0)/vals.length;
    syn.push(syn[syn.length-1]*(1+c/100));
  }
  syn = syn.slice(1);
  s.level = Math.round(syn[syn.length-1]*100)/100;
  s.rsi6 = wilderRSI(syn,6);
  s.prevRsi6 = wilderRSI(syn.slice(0,-1),6);
  s.levelHigh5 = Math.round(Math.max.apply(null,syn.slice(-5))*100)/100;
  s.ma5 = maN(syn,5); s.ma10 = maN(syn,10);
  s.chg5d = syn.length>=6 ? Math.round((syn[syn.length-1]/syn[syn.length-6]-1)*10000)/100 : null;
  // 连板：最近两日连续涨停
  var streak = 0;
  members.forEach(function(m){
    var pc = (m.code.charAt(0)==="6"?"sh":"sz")+m.code;
    var rows = S.klines[pc];
    if(!rows || rows.length<3) return;
    var th = (m.code.indexOf("688")===0 || m.code.indexOf("300")===0) ? 19.5 : 9.5;
    var n = rows.length;
    var c1 = rows[n-2][2] ? (rows[n-1][2]/rows[n-2][2]-1)*100 : 0;
    var c2 = rows[n-3][2] ? (rows[n-2][2]/rows[n-3][2]-1)*100 : 0;
    if(c1>=th && c2>=th) streak++;
  });
  s.streak = streak;
}
function scheduleKlineLoad(force){
  if(TEST) return;
  if(document.hidden) return;
  var queue = [];
  S.indices.forEach(function(x){ queue.push(x.code); });
  S.stocks.forEach(function(x){ queue.push((x.code.charAt(0)==="6"?"sh":"sz")+x.code); });
  if(!force){
    queue = queue.filter(function(pc){ return !lsGet(klCacheKey(pc), null); });
    if(!queue.length){
      // 全部已缓存：直接应用
      var all = [];
      S.indices.forEach(function(x){ all.push(x.code); });
      S.stocks.forEach(function(x){ all.push((x.code.charAt(0)==="6"?"sh":"sz")+x.code); });
      all.forEach(function(pc){ var rows = lsGet(klCacheKey(pc), null); if(rows){ S.klines[pc]=rows; } });
      S.sectors.forEach(function(s){ try{ resynthSector(s.key); }catch(e){} });
      S.klStatus = "已加载(缓存)";
      try{ computeAll(); }catch(e){}
      renderAll();
      return;
    }
  }
  S.klTotal = queue.length; S.klLoaded = 0;
  S.klStatus = "加载中 0/"+queue.length;
  renderDatasource();
  var pos = 0;
  function step(){
    if(document.hidden){ setTimeout(step, 2000); return; }
    var batch = queue.slice(pos, pos+5);
    pos += 5;
    var doneN = 0;
    if(!batch.length){
      S.sectors.forEach(function(s){ try{ resynthSector(s.key); }catch(e){} });
      S.klStatus = "已加载";
      try{ computeAll(); }catch(e){}
      renderAll();
      return;
    }
    batch.forEach(function(pc){
      loadOneKline(pc, function(rows){
        doneN++; S.klLoaded++;
        if(rows){ S.klines[pc]=rows; try{ applyKline(pc, rows); }catch(e){} }
        if(doneN===batch.length){
          S.klStatus = "加载中 "+S.klLoaded+"/"+S.klTotal;
          setTimeout(step, 400);
        }
      });
    });
  }
  setTimeout(step, 800);
}

        if(it && typeof it.f62 === "number"){ S.fundSector[s.key] = Math.round(it.f62/1e8*100)/100; okAny = true; }
      });
    }catch(e){}
    try{ delete window[cb1]; }catch(e){}

  loadScript("https://push2.eastmoney.com/api/qt/clist/get?cb="+cb1+"&pn=1&pz=50&po=1&np=1&fltt=2&invt=2&fid=f3&fs=m:90+t:2&fields=f12,f14,f3,f62", null, function(err){
    if(err){ try{ delete window[cb1]; }catch(e){} finish(); }
  });
  var secids = S.stocks.map(function(s){ return emSecid(s.code); });
  var cb2 = "v5emcb2_"+Math.floor(Date.now()%100000);
  window[cb2] = function(obj){

      var list = obj && obj.data && obj.data.diff ? obj.data.diff : [];

      });
    }catch(e){}
    try{ delete window[cb2]; }catch(e){}

  };
  // ulist 分批，每批 40 只
  var batches = [];
  for(var i=0;i<secids.length;i+=40) batches.push(secids.slice(i,i+40));
  var bDone = 0, bAnyErr = false;
  pending = 1 + batches.length; // clist 1 次 + ulist 每批 1 次
  batches.forEach(function(bb, bi){

    });
  });
}
/* ============ 定时器 ============ */
function startTimers(){
  if(TEST) return;
  setInterval(function(){
    if(document.hidden) return;
    if(isTradingTime()) refreshQuotes(false);
    else updateHeader();
  }, 10000);
  setInterval(function(){
    if(document.hidden) return;
    updateHeader();
  }, 60000);
  setInterval(function(){
    if(document.hidden) return;
    try{ var ck = el("clock"); if(ck){ var n=new Date(); ck.textContent = ("0"+n.getHours()).slice(-2)+":"+("0"+n.getMinutes()).slice(-2)+":"+("0"+n.getSeconds()).slice(-2); } }catch(e){}
  }, 1000);
}
/* ============ Tab 绑定 ============ */
function bindTabs(){
  try{
    var tabs = document.querySelectorAll(".tab");
    for(var i=0;i<tabs.length;i++){
      (function(t){
        t.addEventListener("click", function(){
          var all = document.querySelectorAll(".tab");
          for(var j=0;j<all.length;j++) all[j].className = all[j].className.replace(" act","");
          t.className += " act";
          var p = t.getAttribute("data-p");
          var pns = document.querySelectorAll(".pn");
          for(var k=0;k<pns.length;k++) pns[k].className = pns[k].className.replace(" act","");
          var tgt = el("panel-"+p);
          if(tgt) tgt.className += " act";
        });
      })(tabs[i]);
    }
  }catch(e){}
}
/* ============ 初始化 ============ */
function init(){
  try{ computeAll(); }catch(e){ if(typeof console!=="undefined") console.error("computeAll", e); }
  try{ renderAll(); }catch(e){ if(typeof console!=="undefined") console.error("renderAll", e); }
  try{ bindTabs(); }catch(e){}
  if(!TEST){
    try{ startTimers(); }catch(e){}
    try{ if(isTradingTime()) refreshQuotes(false); }catch(e){}
    try{ scheduleKlineLoad(false); }catch(e){}
    try{ tryEastmoney(); }catch(e){}
  }
}

if(typeof window!=="undefined"){
